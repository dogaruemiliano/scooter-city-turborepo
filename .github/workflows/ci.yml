name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        # CI has no host-Postgres conflict; 5434 keeps DATABASE_URL the same
        # locally and in CI so .env.example values just work.
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U app -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm check-types

      - name: Unit tests
        run: pnpm test

      - name: Prisma migrate + seed (E2E DB)
        env:
          DATABASE_URL: postgresql://app:app@localhost:5434/app
        run: |
          pnpm --filter api db:deploy
          NODE_ENV=test pnpm --filter api db:seed

      - name: E2E tests
        env:
          DATABASE_URL: postgresql://app:app@localhost:5434/app
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET || 'ci-test-access-secret-padded-to-32-chars' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-test-refresh-secret-padded-to-32-chars' }}
          REFRESH_TOKEN_HMAC_SECRET: ${{ secrets.REFRESH_TOKEN_HMAC_SECRET || 'ci-test-refresh-hmac-padded-to-32-chars-x' }}
          OTP_HMAC_SECRET: ${{ secrets.OTP_HMAC_SECRET || 'ci-test-otp-hmac-padded-to-32-chars-pad-x' }}
          NODE_ENV: test
        run: pnpm test:e2e
