services:
  postgres:
    image: postgres:16-alpine
    container_name: turborepo-full-template-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    # 5434 (not 5432) so this template can coexist with any host-installed
    # Postgres on the default port, and with other dev databases on 5433.
    # Adjust to taste; update DATABASE_URL to match.
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
